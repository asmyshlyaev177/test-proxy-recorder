name: Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run tests'
        required: false
        default: true
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

      - name: Run linter
        run: pnpm run lint

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage-reports/lcov.info

      - name: Build project
        run: pnpm run build

  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user root
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm run build

      - name: Build example app
        run: pnpm --filter example-nextjs16 build

      - name: Run e2e record and replay
        # start:all (mock + proxy + next) is backgrounded and must stay alive for
        # both the record and replay runs, so everything lives in one step —
        # background processes do not survive across GitHub Actions steps.
        # Record and replay run playwright directly (not the test:e2e* scripts,
        # which use --ui / restart their own services) against this one stack.
        run: |
          pnpm --filter example-nextjs16 start:all &
          pnpm --filter example-nextjs16 exec wait-on \
            http://localhost:3000 \
            http://localhost:8100/__control \
            --timeout 120000
          APP_PORT=3000 RECORD_MODE=1 pnpm --filter example-nextjs16 exec playwright test --workers 1
          APP_PORT=3000 pnpm --filter example-nextjs16 exec playwright test --retries 1

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-results
          path: apps/example-nextjs16/test-results/
