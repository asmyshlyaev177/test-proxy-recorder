name: Tests

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:
    inputs:
      run_tests:
        description: 'Run tests'
        required: false
        default: true
        type: boolean
  schedule:
    - cron: "0 21 1,15 * *"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run type check
        run: pnpm run typecheck

      - name: Run linter
        run: pnpm run lint

      - name: Run tests with coverage
        run: pnpm run test:coverage

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@89d6c85cfafaec52c72b6c5e8b2878d33104c699 # v1.3.0
        continue-on-error: true
        with:
          project-token: ${{ secrets.CODACY_PROJECT_TOKEN }}
          coverage-reports: coverage-reports/lcov.info

      - name: Build project
        run: pnpm run build

      # Black-box test for `test-proxy-recorder init`: drives the built CLI to
      # scaffold a config, then runs a record/replay cycle through it. No
      # browser needed, so it runs here rather than in the Playwright e2e job.
      - name: Run init scaffold e2e
        run: pnpm run init:test:e2e

  e2e:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble
      options: --user root
    # Cognito creds come from repo secrets. NEXT_PUBLIC_* are baked at build time
    # (not secret); COGNITO_TEST_* are the test-user credentials. When the secrets
    # are absent (e.g. forks), the Cognito step below skips itself.
    env:
      NEXT_PUBLIC_COGNITO_REGION: ${{ secrets.COGNITO_REGION }}
      NEXT_PUBLIC_COGNITO_CLIENT_ID: ${{ secrets.COGNITO_CLIENT_ID }}
      COGNITO_TEST_EMAIL: ${{ secrets.COGNITO_TEST_EMAIL }}
      COGNITO_TEST_PASSWORD: ${{ secrets.COGNITO_TEST_PASSWORD }}
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm run build

      - name: Run e2e record and replay
        # The example's test:e2e:ci script owns its whole stack: it builds the
        # app, starts mock + proxy + next via concurrently, then runs the record
        # pass (RECORD_MODE=1, single worker) followed by the replay pass against
        # that one stack, and tears everything down. It must stay in a single
        # step because the backgrounded services do not survive across GitHub
        # Actions steps.
        run: pnpm run example:test:e2e:ci

      - name: Run auth-mock e2e record and replay
        # The authenticated example (setup-auth → transparent login, then
        # record/replay of protected requests with token + cookie redaction).
        # Same single-step rule as above: it owns its whole stack. Runs after the
        # example above, so its ports (3100/3102/8100) are free by then.
        run: pnpm run auth:mock:test:e2e:ci

      # Real AWS Cognito example, run as two explicit steps so a failure is
      # obviously "record" vs "replay". Both are skipped when the Cognito secrets
      # aren't set (forks, or before a maintainer configures them); both need
      # network to AWS for the login. End users would only run the replay step in
      # CI and record locally — here we record too, to test the recorder itself.
      - name: Run cognito auth e2e — record (with backend)
        if: ${{ env.NEXT_PUBLIC_COGNITO_CLIENT_ID != '' }}
        run: pnpm run auth:cognito:record

      - name: Run cognito auth e2e — replay (no backend)
        if: ${{ env.NEXT_PUBLIC_COGNITO_CLIENT_ID != '' }}
        run: pnpm run auth:cognito:test:e2e

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@b4b15b8c7c6ac21ea08fcf65892d2ee8f75cf882 # v4.4.3
        with:
          name: playwright-results
          path: |
            apps/example-nextjs16/test-results/
            apps/example-auth-mock/test-results/
            apps/example-auth-cognito/test-results/
