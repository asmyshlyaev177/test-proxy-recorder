name: Release

on:
  # Normal flow: release-please maintains the release PR; merging it publishes.
  push:
    branches:
      - master
  # Recovery / manual: publishing also fires when a GitHub Release is published
  # (e.g. created by hand) or the workflow is dispatched manually.
  release:
    types:
      - published
  workflow_dispatch:

# Least privilege by default; each job opts into exactly what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # 1. Maintains the release PR: bumps version + regenerates CHANGELOG.md from
  #    conventional commits. Merging that PR creates the git tag + GitHub Release
  #    and sets release_created=true, which gates the publish job below.
  release-please:
    if: ${{ github.event_name == 'push' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      # Manifest mode exposes the PLURAL `releases_created`; the singular
      # `release_created` is only set in simple (non-manifest) mode.
      releases_created: ${{ steps.release.outputs.releases_created }}
      tag_name: ${{ steps.release.outputs['packages/test-proxy-recorder--tag_name'] }}
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # 2. Publishes to npm with provenance. Fires when release-please just cut a
  #    release (push flow), or directly on a published Release / manual dispatch.
  #    always() lets it run even when release-please was skipped on those events.
  publish:
    needs: release-please
    if: >-
      ${{ always() &&
      (needs.release-please.outputs.releases_created == 'true' ||
      github.event_name == 'release' ||
      github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)
    steps:
      - name: Checkout release commit
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.3.0

      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

      - name: Build
        run: pnpm run build

      # Token-free OIDC trusted publishing needs npm >= 11.5.1; pin a known-good
      # version so we do not depend on whatever npm ships with the Node release.
      - name: Ensure npm supports trusted publishing
        run: npm install -g npm@latest

      # No NPM_TOKEN: auth + provenance both come from the OIDC token granted by
      # `id-token: write`, against the trusted publisher configured on npmjs.com.
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        working-directory: packages/test-proxy-recorder
