library:
  name: 'test-proxy-recorder'
  version: '1.0.1'
  repository: 'https://github.com/asmyshlyaev177/test-proxy-recorder'
  description: 'Records real API responses through an HTTP proxy and replays them in Playwright tests — no backend required on CI.'
  primary_framework: 'framework-agnostic (Next.js adapter included)'

domains:
  - name: 'wiring up the proxy'
    slug: 'proxy-setup'
    description: >
      Everything a developer touches to get recording and replay working:
      the proxy process, package.json scripts, playwright.config.ts webServer,
      per-test fixtures, and the record → commit → replay cycle.

  - name: 'forwarding session identity through SSR'
    slug: 'ssr-headers'
    description: >
      Next.js and other SSR frameworks make server-side fetches that run
      outside the browser context. The proxy correlates those fetches to the
      right test session via x-test-rcrd-id. Getting this header into every
      SSR fetch — through middleware, route handlers, and HTTP clients — is the
      primary Next.js integration challenge.

skills:
  - name: 'proxy-setup'
    slug: 'proxy-setup'
    domain: 'proxy-setup'
    description: >
      Set up the proxy process, package.json scripts, playwright.config.ts
      webServer block, per-test fixtures, and the record → commit → replay
      lifecycle for any Playwright project.
    type: 'core'
    packages:
      - 'test-proxy-recorder'
    covers:
      - 'CLI: test-proxy-recorder <target> --port --dir'
      - 'playwrightProxy.before(page, testInfo, mode, { url })'
      - 'playwrightProxy.teardown()'
      - 'setProxyMode()'
      - 'generateSessionId()'
      - 'Three-service architecture: UI → proxy → backend'
      - 'HAR recording for browser-side fetch (url pattern)'
      - '.mock.json recording for server-side fetch'
      - 'Record mode vs replay mode vs transparent mode'
      - 'TEST_PROXY_RECORDER_PORT env var'
      - 'Global teardown pattern'
      - 'Parallel test execution with fullyParallel: true'
      - 'Session ID naming: folder/FileName__test-name'
      - 'concurrently + wait-on for CI service orchestration'
    tasks:
      - 'Install and configure the proxy for a new project'
      - 'Set up three-service architecture (UI → proxy → backend API)'
      - 'Write a Playwright fixture that enables record/replay per test'
      - 'Record API interactions against the real backend'
      - 'Switch to replay mode and commit recordings for CI'
      - 'Configure parallel test execution without breaking replay'
      - 'Set up browser-only / Chrome extension recording (HAR only)'
    failure_modes:
      - mistake: 'UI app still points to real backend in test mode'
        mechanism: >
          The app env var (e.g. NEXT_PUBLIC_API_URL, INTERNAL_API_URL) must be
          overridden to point at the proxy (http://localhost:8100), not the real
          backend. When omitted, the proxy records nothing because requests bypass it.
        wrong_pattern: |
          # package.json — backend URL not redirected through proxy
          "dev:proxy": "concurrently \"npm run proxy\" \"npm run dev\""
        correct_pattern: |
          # package.json — app's API URL redirected to proxy
          "dev:proxy": "concurrently \"npm run proxy\" \"INTERNAL_API_URL=http://localhost:8100 npm run dev\""
        source: 'README.md — Full-stack Quick Start; maintainer interview'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Wrong CLIENT_SIDE_URL pattern for HAR recording'
        mechanism: >
          The url pattern passed to playwrightProxy.before() must match the
          actual external API domain the browser calls — not the proxy URL.
          Exception: in full-stack apps where the browser also calls the proxy
          (localhost:8100), use /localhost:8100/. Using the wrong pattern means
          browser-side requests are not intercepted, so replay hits the real network.
        wrong_pattern: |
          # Browser-only app — using proxy URL instead of real API domain
          await playwrightProxy.before(page, testInfo, MODE, {
            url: /localhost:8100/,  // wrong for browser-only; proxy isn't involved here
          });
        correct_pattern: |
          # Browser-only / SPA / extension — match real API domain
          await playwrightProxy.before(page, testInfo, MODE, {
            url: /api\.example\.com/,
          });
          # Full-stack app where browser calls through the proxy
          await playwrightProxy.before(page, testInfo, MODE, {
            url: /localhost:8100/,
          });
        source: 'README.md — Playwright Integration; apps/example-extension/e2e/fixtures.ts'
        priority: 'CRITICAL'
        status: 'active'

      - mistake: 'Calling teardown() per-test in parallel mode'
        mechanism: >
          playwrightProxy.teardown() sets the GLOBAL proxy mode to transparent.
          With fullyParallel: true, each worker runs its own afterAll. A fast
          test's teardown() fires while slower tests are still replaying, switching
          the proxy to transparent and routing remaining requests to the real backend.
        wrong_pattern: |
          test.afterAll(async () => {
            await playwrightProxy.teardown(); // breaks other parallel sessions
          });
        correct_pattern: |
          // Omit afterAll entirely — session cleanup is automatic via context.on('close').
          // Only call teardown() in a Playwright globalTeardown:
          // e2e/global-teardown.ts
          export default async function globalTeardown() {
            await playwrightProxy.teardown();
          }
        source: 'README.md — Parallel Replay section'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'webServer URL set to proxy base instead of /__control'
        mechanism: >
          playwright.config.ts webServer.url is used by Playwright to health-check
          that the server is ready. The proxy only exposes /__control as a stable
          endpoint — the root (/) proxies to the backend and may fail if the backend
          is not up. Using / causes Playwright to report the server as unavailable.
        wrong_pattern: |
          webServer: {
            command: 'test-proxy-recorder http://localhost:8000 --port 8100',
            url: 'http://localhost:8100',  // root proxies to backend — may fail
          }
        correct_pattern: |
          webServer: {
            command: 'test-proxy-recorder http://localhost:8000 --port 8100 --dir ./e2e/recordings',
            url: 'http://localhost:8100/__control',
          }
        source: 'README.md — playwright.config.ts examples; apps/example-extension/playwright.config.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Recording files added to .gitignore'
        mechanism: >
          Recordings (.mock.json and .har) must be committed to the repository.
          Adding e2e/recordings/ to .gitignore means CI has no recordings to
          replay from, causing all tests to fail or hit the real network.
        wrong_pattern: |
          # .gitignore
          e2e/recordings/   # breaks CI replay
        correct_pattern: |
          # .gitignore — do NOT add e2e/recordings/
          # Optionally add to .gitattributes to collapse diffs:
          # /e2e/recordings/** binary
        source: 'README.md — Switch to replay and commit section'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Using Next.js dev server for recording instead of build+start'
        mechanism: >
          The Next.js dev server is slower than the production build. Under dev,
          SSR fetches can timeout or execute out of order, producing incomplete or
          flaky recordings. Use `next build && next start` for record sessions.
        wrong_pattern: |
          "dev:proxy": "concurrently \"npm run proxy\" \"INTERNAL_API_URL=http://localhost:8100 next dev\""
          "test:e2e:record": "RECORD_MODE=1 playwright test --workers 1"
        correct_pattern: |
          "start:all": "concurrently \"pnpm mock\" \"pnpm proxy\" \"pnpm start\"",
          "test:e2e:record": "pnpm build && RECORD_MODE=1 playwright test --workers 1 --ui"
        source: 'README.md — Full-stack Quick Start note; apps/example-nextjs16/package.json'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Running recording tests with multiple workers'
        mechanism: >
          Recording is intended to be done manually, one test at a time
          (--workers 1), typically in headed/UI mode so you can observe
          interactions. Replay is what runs in CI with multiple workers and
          headless mode. Mixing these up — recording with multiple workers, or
          running replay headed — produces incomplete recordings or slow CI runs.
        wrong_pattern: |
          # package.json — recording with multiple workers
          "test:e2e:record": "RECORD_MODE=1 playwright test"
          # playwright.config.ts — fullyParallel applies to record too
          fullyParallel: true,
        correct_pattern: |
          # package.json — record: single worker, UI mode; replay: parallel, headless
          "test:e2e:record": "RECORD_MODE=1 playwright test --workers 1 --ui",
          "test:e2e": "playwright test",  # uses fullyParallel: true from config
          # playwright.config.ts
          fullyParallel: !process.env.RECORD_MODE,
        source: 'apps/example-nextjs16/package.json; maintainer interview'
        priority: 'MEDIUM'
        status: 'active'

  - name: 'nextjs-ssr'
    slug: 'nextjs-ssr'
    domain: 'ssr-headers'
    description: >
      Wire up the x-test-rcrd-id session header through Next.js middleware and
      every SSR fetch path so the proxy can correlate server-side requests to
      the correct test session.
    type: 'framework'
    packages:
      - 'test-proxy-recorder'
    covers:
      - 'setNextProxyHeaders(request, response) — middleware helper'
      - 'getRecordingId(headers) — extract session ID'
      - 'createHeadersWithRecordingId(headers, extra) — inject into fetch'
      - 'RECORDING_ID_HEADER constant (x-test-rcrd-id)'
      - 'middleware.ts (Next.js 13–15)'
      - 'proxy.ts (Next.js 16)'
      - 'isRecorderEnabled() — production safety guard'
      - 'React cache() for memoizing header per request'
      - 'Axios interceptor pattern for SSR requests'
      - 'TEST_PROXY_RECORDER_ENABLED env var'
    tasks:
      - 'Add middleware to forward session header through Next.js'
      - 'Inject recording ID into native fetch calls in server components'
      - 'Inject recording ID into axios requests made server-side'
      - 'Guard header forwarding so it is a no-op in production'
      - 'Use React cache() to memoize header lookup per request'
    failure_modes:
      - mistake: 'Using middleware.ts in Next.js 16 instead of proxy.ts'
        mechanism: >
          Next.js 16 renamed the middleware entry point from middleware.ts to
          proxy.ts (placed at the project root alongside next.config.ts).
          Using middleware.ts in a Next.js 16 project silently does nothing —
          the session header is never forwarded, causing all SSR recordings to
          be grouped under the wrong session or missed entirely.
        wrong_pattern: |
          // middleware.ts — ignored in Next.js 16
          import { setNextProxyHeaders } from 'test-proxy-recorder/nextjs';
          export function middleware(request) {
            const response = NextResponse.next();
            setNextProxyHeaders(request, response);
            return response;
          }
        correct_pattern: |
          // proxy.ts — Next.js 16 middleware entry point (at project root)
          import { setNextProxyHeaders } from 'test-proxy-recorder/nextjs';
          export function middleware(request) {
            const response = NextResponse.next();
            setNextProxyHeaders(request, response);
            return response;
          }
          export const config = {
            matcher: ['/((?!_next/static|_next/image|favicon.ico).*)'],
          };
        source: 'README.md — Next.js 16 section; apps/example-nextjs16'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Calling setNextProxyHeaders without forwarding to request headers'
        mechanism: >
          setNextProxyHeaders sets the header on the *response* object so that
          downstream server components can read it via next/headers. It does NOT
          automatically inject the header into outgoing fetch calls — each fetch
          still needs createHeadersWithRecordingId() or a custom axios interceptor.
        wrong_pattern: |
          // middleware.ts — header is set, but SSR fetches still miss it
          export function middleware(request) {
            const response = NextResponse.next();
            setNextProxyHeaders(request, response);
            return response;
          }
          // server component — header not forwarded to fetch
          const data = await fetch('http://localhost:8100/api/data');
        correct_pattern: |
          // server component — explicitly forward header
          import { createHeadersWithRecordingId } from 'test-proxy-recorder/nextjs';
          import { headers } from 'next/headers';
          const data = await fetch('http://localhost:8100/api/data', {
            headers: createHeadersWithRecordingId(await headers(), {
              'Content-Type': 'application/json',
            }),
          });
        source: 'README.md — Manual header forwarding section; channels/web/app/api/v1/bootstrap/route.ts'
        priority: 'HIGH'
        status: 'active'

      - mistake: 'Not guarding header forwarding in production'
        mechanism: >
          setNextProxyHeaders is already a no-op when NODE_ENV=production (unless
          TEST_PROXY_RECORDER_ENABLED=true). However, if a developer bypasses it
          and manually sets the header, they risk leaking session IDs in production.
          The correct pattern is to always go through the library helpers which
          enforce the production guard.
        wrong_pattern: |
          // Manual header injection without production guard
          response.headers.set('x-test-rcrd-id', request.headers.get('x-test-rcrd-id') || '');
        correct_pattern: |
          import { setNextProxyHeaders } from 'test-proxy-recorder/nextjs';
          setNextProxyHeaders(request, response); // no-op in production automatically
        source: 'packages/test-proxy-recorder/src/nextjs/middleware.ts — isRecorderEnabled()'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Re-reading next/headers on every SSR fetch instead of caching'
        mechanism: >
          In Next.js App Router, calling headers() inside each individual fetch
          helper works but is redundant. Wrapping the lookup in React cache()
          memoizes the result for the duration of one server request, avoiding
          repeated async header lookups and aligning with App Router conventions.
        wrong_pattern: |
          // Called in every server component / route handler separately
          async function fetchData() {
            const { headers } = await import('next/headers');
            const recordingId = (await headers()).get('x-test-rcrd-id');
            return fetch(url, { headers: { 'x-test-rcrd-id': recordingId ?? '' } });
          }
        correct_pattern: |
          // lib/recording-id.ts — memoized per request
          import { cache } from 'react';
          import { RECORDING_ID_HEADER } from 'test-proxy-recorder/nextjs';
          export const getServerRecordingId = cache(async () => {
            const { headers } = await import('next/headers');
            return (await headers()).get(RECORDING_ID_HEADER.toLowerCase()) || undefined;
          });
          // In axios interceptor or fetch helper — called once per request
          const recordingId = await getServerRecordingId();
        source: 'channels/web/lib/recording-id.ts; channels/web/core/api/axios.ts'
        priority: 'MEDIUM'
        status: 'active'

      - mistake: 'Importing next/headers at module level in axios interceptor'
        mechanism: >
          next/headers throws if imported outside a Server Component / Route Handler
          request context. In an axios interceptor that runs on both client and server,
          it must be lazily imported inside the interceptor function with a
          typeof window === undefined guard, wrapped in try/catch.
        wrong_pattern: |
          import { headers } from 'next/headers'; // throws on client-side
          axiosForServer.interceptors.request.use(async (config) => {
            const id = (await headers()).get('x-test-rcrd-id');
            config.headers.set('x-test-rcrd-id', id);
            return config;
          });
        correct_pattern: |
          axiosForServer.interceptors.request.use(async (config) => {
            if (typeof window === 'undefined' && isTestMode) {
              try {
                const { getServerRecordingId } = await import('lib/recording-id');
                const recordingId = await getServerRecordingId();
                if (recordingId) config.headers.set(RECORDING_ID_HEADER, recordingId);
              } catch {
                // Not in a Server Component context — silently skip
              }
            }
            return config;
          });
        source: 'channels/web/core/api/axios.ts'
        priority: 'MEDIUM'
        status: 'active'

tensions:
  - name: 'record simplicity vs. replay determinism'
    skills: ['proxy-setup', 'proxy-setup']
    description: >
      Record mode is easiest with the dev server; replay requires the production
      build. Using dev for recording produces faster iteration but flaky
      recordings that fail on CI with the built app.
    implication: >
      Agents default to dev server scripts for everything. The skill must
      explicitly state that recording requires `build + start`, not `dev`.

  - name: 'per-test cleanup vs. parallel safety'
    skills: ['proxy-setup', 'proxy-setup']
    description: >
      Calling teardown() after each test ensures clean state in sequential runs
      but corrupts parallel sessions because teardown() affects the global proxy mode.
    implication: >
      Agents familiar with beforeEach/afterEach patterns will place teardown()
      in afterAll or afterEach. The skill must state that no per-test teardown
      is needed and explain why.

  - name: 'middleware simplicity vs. SSR header propagation completeness'
    skills: ['proxy-setup', 'nextjs-ssr']
    description: >
      Adding setNextProxyHeaders to middleware.ts feels like a complete solution,
      but SSR fetches still need the header injected per-call unless an
      interceptor pattern is used.
    implication: >
      Agents stop at middleware setup and miss that individual fetch/axios calls
      also need createHeadersWithRecordingId() or the axios interceptor.

cross_references:
  - from: 'proxy-setup'
    to: 'nextjs-ssr'
    reason: >
      Full-stack proxy-setup requires the Next.js middleware to correlate SSR
      requests to the right session — proxy-setup is incomplete without nextjs-ssr
      for Next.js apps.

  - from: 'nextjs-ssr'
    to: 'proxy-setup'
    reason: >
      The Next.js header helpers are meaningless without the proxy being
      configured first — nextjs-ssr readers need proxy-setup context.

